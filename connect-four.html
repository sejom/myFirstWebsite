<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Four</title>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f5f5f5;
    }
    a.back {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      text-decoration: none;
      color: #555;
      font-size: 0.95rem;
    }
    a.back:hover { color: #333; }
    h1 { font-size: 2rem; color: #333; margin-bottom: 1rem; }
    #status { font-size: 1.2rem; color: #555; margin-bottom: 1rem; }
    #lobby { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    #lobby input {
      padding: 10px;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      text-align: center;
      width: 200px;
    }
    #lobby button, #restart {
      padding: 10px 24px;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    #lobby button:hover, #restart:hover { background-color: #e9e9e9; }
    #game { display: none; flex-direction: column; align-items: center; }
    #board {
      background: #1a6fc4;
      padding: 10px;
      border-radius: 12px;
      display: grid;
      grid-template-columns: repeat(7, 60px);
      grid-template-rows: repeat(6, 60px);
      gap: 6px;
    }
    .cell {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #f5f5f5;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .cell.red { background: #e74c3c; cursor: default; }
    .cell.yellow { background: #f1c40f; cursor: default; }
    .cell.hover { background: #ddd; }
    #restart { display: none; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <h1>Connect Four</h1>
  <div id="status">Create or join a game</div>

  <div id="lobby">
    <button onclick="createRoom()">Create new game</button>
    <input id="roomInput" placeholder="Enter room code" />
    <button onclick="joinRoom()">Join game</button>
  </div>

  <div id="game">
    <div id="board"></div>
    <button id="restart" onclick="location.reload()">Play again</button>
  </div>

  <script>
    const socket = io('https://tic-tac-toe-server-production-d697.up.railway.app');

    let myPlayer = null;
    let currentRoom = null;
    let myTurn = false;
    let gameBoard = Array(6).fill(null).map(() => Array(7).fill(''));

    const status = document.getElementById('status');
    const lobby = document.getElementById('lobby');
    const game = document.getElementById('game');
    const boardEl = document.getElementById('board');
    const restart = document.getElementById('restart');

    function buildBoard() {
      boardEl.innerHTML = '';
      for (let r = 0; r < 6; r++) {
        for (let c = 0; c < 7; c++) {
          const cell = document.createElement('div');
          cell.classList.add('cell');
          if (gameBoard[r][c] === '1') cell.classList.add('red');
          if (gameBoard[r][c] === '2') cell.classList.add('yellow');
          cell.dataset.col = c;
          cell.addEventListener('click', () => handleClick(c));
          cell.addEventListener('mouseenter', () => {
            if (myTurn && !gameBoard[0][c]) cell.classList.add('hover');
          });
          cell.addEventListener('mouseleave', () => cell.classList.remove('hover'));
          boardEl.appendChild(cell);
        }
      }
    }

    function handleClick(col) {
      if (!myTurn) return;
      socket.emit('connectFourMove', { roomCode: currentRoom, col });
      myTurn = false;
    }

    function createRoom() {
      const roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
      currentRoom = roomCode;
      myPlayer = '1';
      socket.emit('createConnectFourRoom', roomCode);
    }

    function joinRoom() {
      const roomCode = document.getElementById('roomInput').value.toUpperCase();
      currentRoom = roomCode;
      myPlayer = '2';
      socket.emit('joinConnectFourRoom', roomCode);
    }

    socket.on('connectFourRoomCreated', (roomCode) => {
      status.textContent = `Room created! Share this code: ${roomCode}`;
    });

    socket.on('connectFourRoomJoined', (roomCode) => {
      status.textContent = `Joined room ${roomCode}. Waiting for game to start...`;
    });

    socket.on('connectFourStart', () => {
      lobby.style.display = 'none';
      game.style.display = 'flex';
      buildBoard();
      myTurn = myPlayer === '1';
      status.textContent = myTurn ? 'Your turn! (Red)' : "Opponent's turn (Red goes first)";
    });

    socket.on('connectFourMoveMade', ({ board, currentPlayer }) => {
      gameBoard = board;
      buildBoard();
      myTurn = currentPlayer === myPlayer;
      const myColor = myPlayer === '1' ? 'Red' : 'Yellow';
      const oppColor = myPlayer === '1' ? 'Yellow' : 'Red';
      status.textContent = myTurn ? `Your turn! (${myColor})` : `Opponent's turn (${oppColor})`;
    });

    socket.on('connectFourGameOver', ({ winner }) => {
      if (winner === 'draw') {
        status.textContent = "It's a draw!";
      } else if (winner === myPlayer) {
        status.textContent = 'You win!';
      } else {
        status.textContent = 'You lose!';
      }
      restart.style.display = 'block';
    });

    socket.on('error', (msg) => {
      status.textContent = `Error: ${msg}`;
    });

    buildBoard();
  </script>
</body>
</html>
