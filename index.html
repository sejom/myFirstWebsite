<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Room</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: sans-serif;
      min-height: 100vh;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }
    h1 {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 0.5rem;
    }
    p {
      color: #777;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 900px;
    }
    .card {
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #aaa;
    }
    .card .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 1.2rem;
      color: #333;
      margin: 0 0 0.5rem;
    }
    .card p {
      font-size: 0.9rem;
      color: #888;
      margin: 0;
    }
    .badge {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      background: #eee;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Game Room</h1>
  <p>Pick a game and challenge a friend</p>

  <div class="grid">
    <a class="card" href="tic-tac-toe.html">
      <div class="icon">&#10799;</div>
      <h2>Tic Tac Toe</h2>
      <p>Classic 3 in a row</p>
      <span class="badge">2 players</span>
    </a>
    <a class="card" href="connect-four.html">
      <div class="icon">&#9679;</div>
      <h2>Connect Four</h2>
      <p>First to 4 in a row wins</p>
      <span class="badge">2 players</span>
    </a>
    <a class="card" href="nine-mens-morris.html">
      <div class="icon">&#9632;</div>
      <h2>Nine Men's Morris</h2>
      <p>Place, move and capture</p>
      <span class="badge">2 players</span>
    </a>
    <a class="card" href="chess.html">
      <div class="icon">&#9812;</div>
      <h2>Chess</h2>
      <p>The classic strategy game</p>
      <span class="badge">2 players</span>
    </a>
    <a class="card" href="drawing.html">
      <div class="icon">&#9998;</div>
      <h2>Drawing Game</h2>
      <p>Draw and guess words</p>
      <span class="badge">3+ players</span>
    </a>
  </div>
</body>
</html>
