<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f5f5;
    }
    a.back {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      text-decoration: none;
      color: #555;
      font-size: 0.95rem;
    }
    a.back:hover { color: #333; }
    h1 { font-size: 2rem; color: #333; margin-bottom: 1rem; }
    #status { font-size: 1.2rem; color: #555; margin-bottom: 1rem; }
    #lobby { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    #lobby input {
      padding: 10px;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      text-align: center;
      width: 200px;
    }
    #lobby button, #restart {
      padding: 10px 24px;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    #lobby button:hover, #restart:hover { background-color: #e9e9e9; }
    #board {
      display: none;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 8px;
    }
    .cell {
      width: 100px;
      height: 100px;
      background-color: #fff;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .cell:hover { background-color: #e9e9e9; }
    .cell.x { color: #e74c3c; }
    .cell.o { color: #3498db; }
    #restart { display: none; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <h1>Tic Tac Toe</h1>
  <div id="status">Create or join a game</div>

  <div id="lobby">
    <button onclick="createRoom()">Create new game</button>
    <input id="roomInput" placeholder="Enter room code" />
    <button onclick="joinRoom()">Join game</button>
  </div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="restart" onclick="location.reload()">Play again</button>

  <script>
    const socket = io('https://tic-tac-toe-server-production-d697.up.railway.app');

    let myPlayer = null;
    let currentRoom = null;
    let myTurn = false;

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const board = document.getElementById('board');
    const lobby = document.getElementById('lobby');
    const restart = document.getElementById('restart');

    function createRoom() {
      const roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
      currentRoom = roomCode;
      myPlayer = 'X';
      socket.emit('createRoom', roomCode);
    }

    function joinRoom() {
      const roomCode = document.getElementById('roomInput').value.toUpperCase();
      currentRoom = roomCode;
      myPlayer = 'O';
      socket.emit('joinRoom', roomCode);
    }

    socket.on('roomCreated', (roomCode) => {
      status.textContent = `Room created! Share this code: ${roomCode}`;
    });

    socket.on('roomJoined', (roomCode) => {
      status.textContent = `Joined room ${roomCode}. Waiting for game to start...`;
    });

    socket.on('gameStart', () => {
      lobby.style.display = 'none';
      board.style.display = 'grid';
      myTurn = myPlayer === 'X';
      status.textContent = myTurn ? 'Your turn!' : "Opponent's turn";
    });

    socket.on('moveMade', ({ board: newBoard, currentPlayer }) => {
      newBoard.forEach((val, i) => {
        cells[i].textContent = val;
        cells[i].className = 'cell' + (val ? ` ${val.toLowerCase()}` : '');
      });
      myTurn = currentPlayer === myPlayer;
      status.textContent = myTurn ? 'Your turn!' : "Opponent's turn";
    });

    socket.on('gameOver', ({ winner }) => {
      if (winner === 'draw') {
        status.textContent = "It's a draw!";
      } else if (winner === myPlayer) {
        status.textContent = 'You win!';
      } else {
        status.textContent = 'You lose!';
      }
      cells.forEach(cell => cell.style.cursor = 'default');
      restart.style.display = 'block';
    });

    socket.on('error', (msg) => {
      status.textContent = `Error: ${msg}`;
    });

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        if (!myTurn) return;
        const index = parseInt(cell.dataset.index);
        if (cell.textContent) return;
        socket.emit('makeMove', { roomCode: currentRoom, index });
        myTurn = false;
      });
    });
  </script>
</body>
</html>
