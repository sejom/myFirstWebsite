<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawing Game</title>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background-color: #f5f5f5;
      padding: 1rem;
    }
    a.back {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      text-decoration: none;
      color: #555;
      font-size: 0.95rem;
    }
    h1 { font-size: 2rem; color: #333; margin-bottom: 0.5rem; }
    #status { font-size: 1.1rem; color: #555; margin-bottom: 1rem; text-align: center; }
    #lobby { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    #lobby input, #guess-input {
      padding: 10px;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      text-align: center;
      width: 200px;
    }
    #lobby button, #guess-btn, #restart {
      padding: 10px 24px;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    #lobby button:hover, #guess-btn:hover, #restart:hover { background-color: #e9e9e9; }
    #game { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
    #word-display {
      font-size: 1.5rem;
      font-weight: 500;
      color: #333;
      margin-bottom: 0.5rem;
      letter-spacing: 0.2em;
    }
    #canvas-container { position: relative; }
    canvas {
      background: #fff;
      border: 2px solid #ccc;
      border-radius: 8px;
      cursor: crosshair;
      touch-action: none;
    }
    #tools {
      display: flex;
      gap: 8px;
      margin-top: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .color-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #ccc;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .color-btn:hover { transform: scale(1.2); }
    .color-btn.active { border-color: #333; border-width: 3px; }
    #brush-size {
      width: 100px;
    }
    #clear-btn {
      padding: 6px 16px;
      font-size: 0.9rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    #guess-row {
      display: flex;
      gap: 8px;
      margin-top: 0.75rem;
    }
    #chat {
      width: 100%;
      max-height: 120px;
      overflow-y: auto;
      background: #fff;
      border: 2px solid #ccc;
      border-radius: 8px;
      padding: 8px;
      margin-top: 0.75rem;
      font-size: 0.9rem;
    }
    .chat-msg { padding: 2px 0; color: #333; }
    .chat-msg.correct { color: #27ae60; font-weight: 500; }
    #restart { display: none; margin-top: 1rem; }
    #players-list { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }
    #timer { font-size: 1.2rem; font-weight: 500; color: #e74c3c; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <h1>Drawing Game</h1>
  <div id="status">Create or join a game</div>

  <div id="lobby">
    <button onclick="createRoom()">Create new game</button>
    <input id="roomInput" placeholder="Enter room code" />
    <button onclick="joinRoom()">Join game</button>
  </div>

  <div id="game">
    <div id="players-list"></div>
    <div id="timer"></div>
    <div id="word-display"></div>
    <div id="canvas-container">
      <canvas id="canvas" width="560" height="400"></canvas>
    </div>
    <div id="tools">
      <button id="clear-btn" onclick="clearCanvas()">Clear</button>
      <input type="range" id="brush-size" min="2" max="30" value="6">
      <div class="color-btn active" style="background:#000000" data-color="#000000" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#e74c3c" data-color="#e74c3c" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#3498db" data-color="#3498db" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#2ecc71" data-color="#2ecc71" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#f39c12" data-color="#f39c12" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#9b59b6" data-color="#9b59b6" onclick="setColor(this)"></div>
      <div class="color-btn" style="background:#ffffff; border-color:#aaa" data-color="#ffffff" onclick="setColor(this)"></div>
    </div>
    <div id="guess-row">
      <input id="guess-input" placeholder="Type your guess..." onkeydown="if(event.key==='Enter') submitGuess()" />
      <button id="guess-btn" onclick="submitGuess()">Guess</button>
    </div>
    <div id="chat"></div>
    <button id="restart" onclick="location.reload()">Play again</button>
  </div>

  <script>
    const socket = io('https://tic-tac-toe-server-production-d697.up.railway.app');

    let myPlayer = null;
    let currentRoom = null;
    let isDrawing = false;
    let isDrawer = false;
    let currentColor = '#000000';
    let lastX = 0, lastY = 0;
    let timerInterval = null;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function setColor(el) {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      currentColor = el.dataset.color;
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (isDrawer) socket.emit('drawingClear', { roomCode: currentRoom });
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return [(clientX - rect.left) * scaleX, (clientY - rect.top) * scaleY];
    }

    canvas.addEventListener('mousedown', e => { if (!isDrawer) return; isDrawing = true; [lastX, lastY] = getPos(e); });
    canvas.addEventListener('mousemove', e => {
      if (!isDrawing || !isDrawer) return;
      const [x, y] = getPos(e);
      const size = parseInt(document.getElementById('brush-size').value);
      draw(lastX, lastY, x, y, currentColor, size);
      socket.emit('drawing', { roomCode: currentRoom, x0: lastX, y0: lastY, x1: x, y1: y, color: currentColor, size });
      [lastX, lastY] = [x, y];
    });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); if (!isDrawer) return; isDrawing = true; [lastX, lastY] = getPos(e); });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!isDrawing || !isDrawer) return;
      const [x, y] = getPos(e);
      const size = parseInt(document.getElementById('brush-size').value);
      draw(lastX, lastY, x, y, currentColor, size);
      socket.emit('drawing', { roomCode: currentRoom, x0: lastX, y0: lastY, x1: x, y1: y, color: currentColor, size });
      [lastX, lastY] = [x, y];
    });
    canvas.addEventListener('touchend', () => isDrawing = false);

    function draw(x0, y0, x1, y1, color, size) {
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = color;
      ctx.lineWidth = size;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    function submitGuess() {
      const input = document.getElementById('guess-input');
      const guess = input.value.trim();
      if (!guess) return;
      socket.emit('drawingGuess', { roomCode: currentRoom, guess, player: myPlayer });
      input.value = '';
    }

    function addChat(msg, correct = false) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.classList.add('chat-msg');
      if (correct) div.classList.add('correct');
      div.textContent = msg;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function startTimer(seconds) {
      clearInterval(timerInterval);
      let t = seconds;
      document.getElementById('timer').textContent = `${t}s`;
      timerInterval = setInterval(() => {
        t--;
        document.getElementById('timer').textContent = `${t}s`;
        if (t <= 0) clearInterval(timerInterval);
      }, 1000);
    }

    function createRoom() {
      const roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
      currentRoom = roomCode;
      myPlayer = 'player_' + Math.random().toString(36).substring(2, 6);
      socket.emit('createDrawingRoom', { roomCode, player: myPlayer });
    }

    function joinRoom() {
      const roomCode = document.getElementById('roomInput').value.toUpperCase();
      currentRoom = roomCode;
      myPlayer = 'player_' + Math.random().toString(36).substring(2, 6);
      socket.emit('joinDrawingRoom', { roomCode, player: myPlayer });
    }

    socket.on('drawingRoomCreated', (roomCode) => {
      document.getElementById('status').textContent = `Room created! Share code: ${roomCode} — waiting for players (need 2+), then first player starts automatically.`;
    });

    socket.on('drawingRoomJoined', (roomCode) => {
      document.getElementById('status').textContent = `Joined room ${roomCode}. Waiting for game to start...`;
    });

    socket.on('drawingStart', ({ drawer, word, timeLimit, players }) => {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game').style.display = 'flex';
      isDrawer = drawer === myPlayer;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      document.getElementById('players-list').textContent = `Players: ${players.join(', ')}`;
      if (isDrawer) {
        document.getElementById('word-display').textContent = `Draw: ${word}`;
        document.getElementById('status').textContent = 'You are drawing!';
        document.getElementById('guess-input').disabled = true;
        document.getElementById('guess-btn').disabled = true;
      } else {
        document.getElementById('word-display').textContent = '_ '.repeat(word).trim();
        document.getElementById('status').textContent = 'Guess the word!';
        document.getElementById('guess-input').disabled = false;
        document.getElementById('guess-btn').disabled = false;
      }
      startTimer(timeLimit);
    });

    socket.on('drawing', ({ x0, y0, x1, y1, color, size }) => {
      draw(x0, y0, x1, y1, color, size);
    });

    socket.on('drawingClear', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    socket.on('drawingCorrectGuess', ({ player, word }) => {
      addChat(`${player} guessed the word: ${word}!`, true);
    });

    socket.on('drawingWrongGuess', ({ player, guess }) => {
      addChat(`${player}: ${guess}`);
    });

    socket.on('drawingRoundOver', ({ word, nextDrawer }) => {
      clearInterval(timerInterval);
      document.getElementById('timer').textContent = '';
      addChat(`Round over! The word was: ${word}`);
      document.getElementById('status').textContent = `Next round starting soon... ${nextDrawer} is drawing.`;
    });

    socket.on('drawingGameOver', ({ scores }) => {
      clearInterval(timerInterval);
      const scoreText = Object.entries(scores).map(([p, s]) => `${p}: ${s}`).join(', ');
      document.getElementById('status').textContent = `Game over! Scores — ${scoreText}`;
      document.getElementById('restart').style.display = 'block';
    });

    socket.on('error', (msg) => {
      document.getElementById('status').textContent = `Error: ${msg}`;
    });
  </script>
</body>
</html>
